<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blooming Flowers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dark-color: #314334;
      --deep-color: #27362a;
      --stem-dark: #4b7551;
      --stem-light: #a0bd87;
      --petal-dark: #cb788a;
      --petal-light: #ffd1bc;
      --gold: #f3c76c;
      --pink-light: #ffd7ca;
    }

    html, body { width: 100%; height: 100%; }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      perspective: 1000px;
      background-color: var(--dark-color);
    }

    .night {
      position: fixed;
      inset: 0;
      filter: blur(.08vmin);
      background:
        radial-gradient(ellipse at 50% -10%, rgba(255,222,170,.34), transparent 48%),
        radial-gradient(ellipse at bottom, var(--deep-color), rgba(229,176,117,.16)),
        linear-gradient(180deg, #657057 0%, #3d4a3b 48%, #29362d 100%);
    }

    .flowers {
      position: relative;
      width: 0;
      height: 0;
      transform: scale(.72);
      transform-origin: bottom center;
    }

    .flower {
      position: absolute;
      bottom: 10vmin;
      transform-origin: bottom center;
      z-index: 10;
      --fl-speed: .8s;
    }

    .flower--1 { animation: moving-flower-1 4s linear infinite; }
    .flower--1 .flower__line { height: 64vmin; animation-delay: .3s; }
    .flower--2 { left: 50%; transform: rotate(30deg); animation: moving-flower-2 4s linear infinite; }
    .flower--2 .flower__line { height: 56vmin; animation-delay: .8s; }
    .flower--3 { left: 50%; transform: rotate(-15deg); animation: moving-flower-3 4s linear infinite; }
    .flower--3 .flower__line { height: 53vmin; animation-delay: .9s; }

    .flower__leafs { position: relative; animation: blooming-flower 2s backwards; }
    .flower__leafs--1 { animation-delay: 1.05s; }
    .flower__leafs--2 { animation-delay: 1.35s; }
    .flower__leafs--3 { animation-delay: 1.65s; }

    .flower__leafs::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -100%);
      width: 8vmin;
      height: 8vmin;
      background-color: var(--gold);
      filter: blur(10vmin);
    }

    .flower__leaf {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 8vmin;
      height: 11vmin;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      background-color: var(--petal-light);
      background-image: linear-gradient(to top, var(--petal-dark), var(--petal-light));
      transform-origin: bottom center;
      opacity: .94;
      box-shadow: inset 0 0 2vmin rgba(255,255,255,.48);
    }
    .flower__leaf--1 { transform: translate(-10%,1%) rotateY(40deg) rotateX(-50deg); }
    .flower__leaf--2 { transform: translate(-50%,-4%) rotateX(40deg); }
    .flower__leaf--3 { transform: translate(-90%,0%) rotateY(45deg) rotateX(50deg); }
    .flower__leaf--4 {
      width: 8vmin;
      height: 8vmin;
      transform-origin: bottom left;
      border-radius: 4vmin 10vmin 4vmin 4vmin;
      transform: translate(0%,18%) rotateX(70deg) rotate(-43deg);
      background-image: linear-gradient(to top, #d78587, #ffe2bb);
      z-index: 1;
      opacity: .85;
    }

    .flower__white-circle {
      position: absolute;
      left: -3.5vmin;
      top: -3vmin;
      width: 9vmin;
      height: 4vmin;
      border-radius: 50%;
      background: #fff3cd;
      box-shadow: 0 0 2vmin rgba(255,222,137,.55);
    }
    .flower__white-circle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%,-50%);
      width: 60%;
      height: 60%;
      border-radius: inherit;
      background: repeating-linear-gradient(45deg, rgba(130,87,38,.08) 0 1px, transparent 1px 7px), linear-gradient(90deg, #ffe89b, #e4a53d);
    }

    .flower__line {
      width: 1.5vmin;
      height: 55vmin;
      background-image: linear-gradient(to left, rgba(0,0,0,.2), transparent, rgba(255,255,255,.2)), linear-gradient(to top, transparent 10%, var(--stem-dark), var(--stem-light));
      box-shadow: inset 0 0 2px rgba(0,0,0,.45);
      animation: grow-flower-tree 4s backwards;
    }

    .flower__line__leaf {
      --w: 7vmin;
      --h: calc(var(--w) + 2vmin);
      position: absolute;
      top: 20%;
      left: 90%;
      width: var(--w);
      height: var(--h);
      border-top-right-radius: var(--h);
      border-bottom-left-radius: var(--h);
      background-image: linear-gradient(to top, rgba(75,117,81,.45), var(--stem-light));
      animation: blooming-leaf-right var(--fl-speed) backwards;
    }
    .flower__line__leaf--1 { animation-delay: 1.6s; transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--2 { top: 45%; animation-delay: 1.4s; transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--3,
    .flower__line__leaf--4,
    .flower__line__leaf--6 {
      border-top-right-radius: 0;
      border-bottom-left-radius: 0;
      border-top-left-radius: var(--h);
      border-bottom-right-radius: var(--h);
      left: -460%;
      top: 12%;
      animation-name: blooming-leaf-left;
      transform: rotate(-70deg) rotateY(30deg);
    }
    .flower__line__leaf--3 { animation-delay: 1.2s; }
    .flower__line__leaf--4 { top: 40%; animation-delay: 1s; }
    .flower__line__leaf--5 { top: 0; transform-origin: left; animation-delay: 1.8s; transform: rotate(70deg) rotateY(30deg) scale(.6); }
    .flower__line__leaf--6 { top: -2%; left: -450%; transform-origin: right; animation-delay: 2s; transform: rotate(-70deg) rotateY(30deg) scale(.6); }

    .flower__light {
      position: absolute;
      bottom: 0;
      width: 1vmin;
      height: 1vmin;
      border-radius: 50%;
      background: var(--gold);
      filter: blur(.2vmin);
      animation: light-ans 4s linear infinite backwards;
    }
    .flower__light:nth-child(odd) { background: var(--pink-light); }
    .flower__light--1 { left: -2vmin; animation-delay: 1s; }
    .flower__light--2 { left: 3vmin; animation-delay: .5s; }
    .flower__light--3 { left: -6vmin; animation-delay: .3s; }
    .flower__light--4 { left: 6vmin; animation-delay: .9s; }
    .flower__light--5 { left: -1vmin; animation-delay: 1.5s; }
    .flower__light--6 { left: -4vmin; animation-delay: 3s; }
    .flower__light--7 { left: 3vmin; animation-delay: 2s; }
    .flower__light--8 { left: -6vmin; animation-delay: 3.5s; }

    .growing-grass { animation: growing-grass-ans 1s 2s backwards; }
    .flower__grass {
      --c: #739864;
      --line-w: 1.5vmin;
      position: absolute;
      bottom: 12vmin;
      left: -7vmin;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      z-index: 20;
      transform-origin: bottom center;
      transform: rotate(-48deg) rotateY(40deg);
    }
    .flower__grass--1 { animation: moving-grass 2s linear infinite; }
    .flower__grass--2 { left: 2vmin; bottom: 10vmin; transform: scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); opacity: .8; z-index: 0; animation: moving-grass-2 1.5s linear infinite; }
    .flower__grass--top { width: 7vmin; height: 10vmin; border-top-right-radius: 100%; border-right: var(--line-w) solid var(--c); transform-origin: bottom center; transform: rotate(-2deg); }
    .flower__grass--bottom { margin-top: -2px; width: var(--line-w); height: 25vmin; background-image: linear-gradient(to top, transparent, var(--c)); }
    .flower__grass__leaf { --size: 9vmin; position: absolute; width: calc(var(--size)*2.1); height: var(--size); border-top-left-radius: var(--size); border-top-right-radius: var(--size); background-image: linear-gradient(to top, transparent, transparent 30%, var(--c)); }
    .flower__grass__leaf--1 { top: -6%; left: 30%; --size: 6vmin; transform: rotate(-20deg); animation: grass-leaf-left 2s 2.6s backwards; }
    .flower__grass__leaf--2 { top: -5%; left: -110%; --size: 6vmin; transform: rotate(10deg); animation: grass-leaf-right 2s 2.4s backwards; }
    .flower__grass__leaf--3 { top: 5%; left: 60%; --size: 8vmin; transform: rotate(-18deg); animation: grass-leaf-left 2s 2.2s backwards; }
    .flower__grass__leaf--4 { top: 6%; left: -135%; --size: 8vmin; transform: rotate(2deg); animation: grass-leaf-right 2s 2s backwards; }
    .flower__grass__leaf--5 { top: 20%; left: 60%; --size: 10vmin; transform: rotate(-24deg); animation: grass-leaf-left 2s 1.8s backwards; }
    .flower__grass__leaf--6 { top: 22%; left: -180%; --size: 10vmin; transform: rotate(10deg); animation: grass-leaf-right 2s 1.6s backwards; }
    .flower__grass__leaf--7 { top: 39%; left: 70%; --size: 10vmin; transform: rotate(-10deg); animation: grass-leaf-left 2s 1.4s backwards; }
    .flower__grass__leaf--8 { top: 40%; left: -215%; --size: 11vmin; transform: rotate(10deg); animation: grass-leaf-right 2s 1.2s backwards; }

    .flower__g-long {
      --w: 2vmin;
      --h: 6vmin;
      --c: #789c67;
      position: absolute;
      bottom: 10vmin;
      left: -3vmin;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      transform-origin: bottom center;
      transform: rotate(-30deg) rotateY(-20deg);
      animation: flower-g-long 3s linear infinite;
    }
    .flower__g-long__top { width: calc(var(--w) + 1vmin); height: var(--h); border-top-right-radius: 100%; border-right: .7vmin solid var(--c); transform: translate(-.7vmin,1vmin); }
    .flower__g-long__bottom { width: var(--w); height: 44vmin; background-image: linear-gradient(to top, transparent 30%, var(--c)); clip-path: polygon(35% 0,65% 1%,100% 100%,0 100%); }

    .grow-ans { animation: grow-ans 2s var(--d) backwards; }

    @keyframes grow-ans { 0% { transform: scale(0); opacity: 0; } }
    @keyframes blooming-flower { 0% { transform: scale(0); } }
    @keyframes grow-flower-tree { 0% { height: 0; border-radius: 1vmin; } }
    @keyframes blooming-leaf-right { 0% { transform-origin: left; transform: rotate(70deg) rotateY(30deg) scale(0); } }
    @keyframes blooming-leaf-left { 0% { transform-origin: right; transform: rotate(-70deg) rotateY(30deg) scale(0); } }
    @keyframes moving-flower-1 { 0%,100% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } }
    @keyframes moving-flower-2 { 0%,100% { transform: rotate(18deg); } 50% { transform: rotate(14deg); } }
    @keyframes moving-flower-3 { 0%,100% { transform: rotate(-18deg); } 50% { transform: rotate(-20deg) rotateY(-10deg); } }
    @keyframes light-ans { 0% { opacity:0; transform:translateY(0); } 25% { opacity:1; transform:translateY(-5vmin) translateX(-2vmin); } 50% { opacity:1; transform:translateY(-15vmin) translateX(2vmin); } 75% { transform:translateY(-20vmin) translateX(-2vmin); } 100% { opacity:0; transform:translateY(-30vmin); filter:blur(1vmin); } }
    @keyframes moving-grass { 0%,100% { transform:rotate(-48deg) rotateY(40deg); } 50% { transform:rotate(-50deg) rotateY(40deg); } }
    @keyframes moving-grass-2 { 0%,100% { transform:scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); } 50% { transform:scale(.5) rotate(79deg) rotateX(10deg) rotateY(-200deg); } }
    @keyframes growing-grass-ans { 0% { transform:scale(0); } }
    @keyframes grass-leaf-left { 0% { transform-origin:bottom left; transform:rotate(-18deg) scale(0); } }
    @keyframes grass-leaf-right { 0% { transform-origin:bottom right; transform:rotate(10deg) scale(0); } }
    @keyframes flower-g-long { 0%,100% { transform:rotate(-30deg) rotateY(-20deg); } 50% { transform:rotate(-33deg) rotateY(-20deg); } }

    .not-loaded * { animation-play-state: paused !important; }
  </style>
</head>
<body class="not-loaded">
  <div class="night"></div>
  <div class="flowers">
    <div class="flower flower--1">
      <div class="flower__leafs flower__leafs--1">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
        <div class="flower__light flower__light--1"></div>
        <div class="flower__light flower__light--2"></div>
        <div class="flower__light flower__light--3"></div>
        <div class="flower__light flower__light--4"></div>
        <div class="flower__light flower__light--5"></div>
        <div class="flower__light flower__light--6"></div>
        <div class="flower__light flower__light--7"></div>
        <div class="flower__light flower__light--8"></div>
      </div>
      <div class="flower__line">
        <div class="flower__line__leaf flower__line__leaf--1"></div>
        <div class="flower__line__leaf flower__line__leaf--2"></div>
        <div class="flower__line__leaf flower__line__leaf--3"></div>
        <div class="flower__line__leaf flower__line__leaf--4"></div>
        <div class="flower__line__leaf flower__line__leaf--5"></div>
        <div class="flower__line__leaf flower__line__leaf--6"></div>
      </div>

    <div class="flower flower--2">
      <div class="flower__leafs flower__leafs--2">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
        <div class="flower__light flower__light--1"></div>
        <div class="flower__light flower__light--2"></div>
        <div class="flower__light flower__light--3"></div>
        <div class="flower__light flower__light--4"></div>
        <div class="flower__light flower__light--5"></div>
        <div class="flower__light flower__light--6"></div>
        <div class="flower__light flower__light--7"></div>
        <div class="flower__light flower__light--8"></div>
      </div>
      <div class="flower__line">
        <div class="flower__line__leaf flower__line__leaf--1"></div>
        <div class="flower__line__leaf flower__line__leaf--2"></div>
        <div class="flower__line__leaf flower__line__leaf--3"></div>
        <div class="flower__line__leaf flower__line__leaf--4"></div>
      </div>
    </div>

    <div class="flower flower--3">
      <div class="flower__leafs flower__leafs--3">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
        <div class="flower__light flower__light--1"></div>
        <div class="flower__light flower__light--2"></div>
        <div class="flower__light flower__light--3"></div>
        <div class="flower__light flower__light--4"></div>
        <div class="flower__light flower__light--5"></div>

        <div class="flower__light flower__light--8"></div>

      <div class="flower__line">
        <div class="flower__line__leaf flower__line__leaf--1"></div>
        <div class="flower__line__leaf flower__line__leaf--2"></div>
        <div class="flower__line__leaf flower__line__leaf--3"></div>
        <div class="flower__line__leaf flower__line__leaf--4"></div>
      </div>
    </div>

    <div class="grow-ans" style="--d:1.2s">

    <div class="growing-grass">

        <div class="flower__grass--top"></div>

      </div>

  <script>
    window.onload = () => {
      const timer = setTimeout(() => {
        document.body.classList.remove('not-loaded');
        clearTimeout(timer);
      }, 180);
    };
  </script>
</body>
</html>
